<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Laskutusjärjestelmä</title>

<style>
body {
  font-family: Arial;
}

.tabs {
  margin-bottom: 10px;
}

.tab-button {
  padding: 10px;
  cursor: pointer;
  border: 1px solid #ccc;
  background-color: #eee;
}

.tab-button.active {
  background-color: #ddd;
}

.tab-content {
  display: none;
  border: 1px solid #ccc;
  padding: 10px;
}

.tab-content.active {
  display: block;
}

li {
  cursor: pointer;
  margin: 5px 0;
}

#tablesContainer {
  display: flex;
  gap: 20px;
  align-items: flex-start;
}

.info {
  margin-top: 10px;
  padding: 10px;
  border: 1px solid #aaa;
  background-color: #f9f9f9;
}

tr:hover {
    cursor: pointer;
}

.selected {
  background-color: #dee7f1;
}

.form {
  display:none; 
  border:1px solid #ccc; 
  padding:15px; 
  width:350px; 
  border-radius:8px; 
  background:#f9f9f9;
}

table {
  border-collapse: collapse;
  width: 100%;
}

th, td {
  border: 1px solid #eeeded;
  padding: 6px;
}

.submitButton {
  padding:6px 12px; 
  border:none; 
  background:#4CAF50; 
  color:white; 
  border-radius:4px; 
  cursor:pointer;
}

</style>

</head>
<body>

<h1>Laskutusjärjestelmä</h1>

<div class="tabs">
  <button class="tab-button active" onclick="openTab(event, 'laskut')">Laskut</button>
  <button class="tab-button" onclick="openTab(event, 'asiakkaat')">Asiakkaat</button>
</div>


<div id="laskut" class="tab-content active">
  <table id="laskuTable">
    <thead>
      <tr>
        <th>Lasku-ID</th>
        <th>Tila</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
  
  <div id="laskuInfo" class="info">Lisätietoja klikkaamalla</div>
  <br>
    
  <button onclick="toggleForm('laskuForm')">+ Luo laskupohja</button>
  <button onclick="">+ Muokkaa laskua</button>
  <button onclick="toggleForm('tuntityoForm')">+ Lisää tuntityö</button>
  <button onclick="toggleForm('tarvikeForm')">+ Lisää tarvike</button>

  <div id="laskuForm" class="form">
      <h3>Uusi laskupohja</h3>

      <form id="formLasku">
          <label for="tyokohdeSelect">Työkohteen ID ja asiakas:</label><br>
          <select id="tyokohdeSelect" name="tyokohde_id" required>
              <option value="">-- Valitse työkohde --</option>
          </select><br><br>
          <label for="tyotyyppiSelect">Työtyyppi:</label><br>
          <select id="tyotyyppiSelect" name="tyotyyppi" required>
              <option value="">-- Valitse työtyyppi --</option>
              <option value="tuntityö">Tuntityö</option>
              <option value="urakkatyö">Urakkatyö</option>
          </select><br><br>

          <button type="submit" class="submitButton">
              Lisää laskupohja
          </button>
      </form>
  </div>

  <div id="tuntityoForm" class="form">
    <h3>Lisää uusi tuntityö</h3>

    <form id="formTuntityo">
        <label for="laskuId">Laskun ID:</label><br>
        <input type="number" min="0" id="laskuId" name="laskuId" placeholder="Laskun ID" required><br><br>

        <label for="paivamaara">Päivämäärä:</label><br>
        <input type="date" id="paivamaara" name="paivamaara" required><br><br>

        <label for="tunnit">Tunnit:</label><br>
        <input type="number" id="tunnit" name="tunnit" step="0.01" placeholder="Tunnit" required><br><br>

        <label for="tyotyyppi_id">Työtyypin ID:</label><br>
        <input type="number" min="0" id="tyotyyppi_id" name="tyotyyppi_id" placeholder="Työtyypin ID" required><br><br>

        <label for="alepros">Alennusprosentti:</label><br>
        <input type="number" id="alepros" name="alepros" min="0" max="100" placeholder="Alennus %" value="0"><br><br>

        <button type="submit" class="submitButton">
            Lisää tuntityö
        </button>
    </form>
  </div>

  <div id="tarvikeForm" class="form">
    <h3>Lisää tarvike</h3>

    <form id="formTarvike">
      <label for="tarvikeSelect">Lasku ID: <span id="laskuIdTarvike">--</span></label><br><br>
      <input type="hidden" name="lasku_id" id="laskuIdInput">
      <label for="tarvikeSelectLabel">Tarvike:</label><br>
          <select id="tarvikeSelect" name="tarvike_id" required>
              <option value="">-- Valitse tarvike --</option>
          </select><br><br>
      
      <label>Yksikkö: <span id="tarvikeYksikko">--</span></label><br><br>
      <input id="maara" placeholder="Määrä"><br><br>

      <label for="alepros">Alennusprosentti:</label><br>
      <input type="number" id="alepros" name="alepros" min="0" max="100" placeholder="Alennus %" value="0"><br><br>

      <button type="submit" class="submitButton">
        Lisää tarvike
      </button>
    </form>
  </div>
</div>

<div id="asiakkaat" class="tab-content">
  
  <div id="tablesContainer">
    <table id="asiakasTable">
        <thead>
          <tr>
            <th>Asiakas-ID</th>
            <th>Nimi</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>

    <table id="tyokohdeTable">
        <thead>
          <tr>
            <th>Työkohde-ID</th>
            <th>Osoite</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
  </div>

  <div id="tyokohdeInfo" class="info">Lisätietoja klikkaamalla</div>
  <br>

  <button onclick="toggleForm('tyokohdeForm')">+ Lisää asiakkaalle työkohde</button>
      
  <div id="tyokohdeForm" class="form-box" style="display:none">
    <h3>Lisää uusi työkohde</h3>
    <input id="tyokohdeNimi" placeholder="Työkohteen nimi"><br>
    <input id="tyokohdeOsoite" placeholder="Osoite"><br>
    <input id="tyokohdeAsiakas" placeholder="Asiakas ID"><br>
    <button onclick="addTyokohde()">Tallenna</button>
  </div>
  
  <h3>Lisää uusi asiakas</h3>

  <input id="nimi" placeholder="Nimi">
  <input id="osoite" placeholder="Osoite">

  <button onclick="addCustomer()">Lisää asiakas</button>
</div>

 



<script>

let selectedLaskuId = null;

function openTab(event, tabId) {
    const tabs = document.querySelectorAll('.tab-content');
    const buttons = document.querySelectorAll('.tab-button');

    tabs.forEach(tab => tab.classList.remove('active'));
    buttons.forEach(btn => btn.classList.remove('active'));

    document.getElementById(tabId).classList.add('active');
    event.target.classList.add('active');
}

function showInfo(infoId, text) {
    document.getElementById(infoId).textContent = text;
}

function toggleForm(id) {
    const form = document.getElementById(id);

    if (getComputedStyle(form).display === "none") {
      form.style.display = "block";
    } else {
      form.style.display = "none";
    }
}


document.getElementById("formLasku").addEventListener("submit", function (e) {
    e.preventDefault();
    addLasku();
});

async function addLasku(){
    const select = document.getElementById("tyokohdeSelect");
    const tyokohde_id = document.getElementById("tyokohdeSelect").value;
    const tyotyyppi = document.getElementById("tyotyyppiSelect").value;

    if (!tyokohde_id || !tyotyyppi) {
        alert("Valitse työkohde ja työtyyppi");
        return;
    }
    await fetch("/lasku", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ tyokohde_id, tyotyyppi })
    });
  document.getElementById("tyokohdeSelect").value = "";
  document.getElementById("tyotyyppiSelect").value = "";
  loadLasku();
}


async function loadLasku() {
    const res = await fetch('/lasku');
    const data = await res.json();
    const tbody = document.querySelector('#laskuTable tbody');
    tbody.innerHTML = '';

    data.forEach(row => {
      const tr = document.createElement('tr');
      tr.innerHTML = `<td>${row.lasku_id}</td><td>${row.laskun_tila}</td>`;
      tr.onclick = () => {
          selectedLaskuId = row.lasku_id;

          showInfo('laskuInfo', `Valittu lasku: ${row.lasku_id}`);

          document.querySelectorAll('#laskuTable tr').forEach(r => r.classList.remove('selected'));
          tr.classList.add('selected');

          const laskuSpan = document.getElementById('laskuIdTarvike');
          laskuSpan.textContent = selectedLaskuId;
          document.getElementById('laskuIdInput').value = selectedLaskuId;
    };
      tbody.appendChild(tr);
    });
}
loadLasku();

async function loadAsiakas() {
    const res = await fetch('/asiakas');
    const data = await res.json();
    const tbody = document.querySelector('#asiakasTable tbody');
    tbody.innerHTML = '';

    data.forEach(row => {
      const tr = document.createElement('tr');
      tr.innerHTML = `<td>${row.asiakas_id}</td><td>${row.nimi}</td>`;
      tr.onclick = () => showInfo('tyokohdeInfo', `Asiakas ${row.nimi}, Osoite: ${row.osoite}`);
      tbody.appendChild(tr);
    });
}
loadAsiakas();

async function loadTarvikkeet() {
  const res = await fetch('/tarvike');
  const data = await res.json();

  const select = document.getElementById('tarvikeSelect');
  if (select) {
    select.innerHTML = '<option value=""> -- Valitse tarvike --</option>';
    
    data.forEach(row => {
      const option = document.createElement('option');
      const id = row.tarvike_id;
      const nimi = row.nimi;
      option.value = id;
      option.dataset.yksikko = row.yksikko;
      option.textContent = `ID: ${id}, Nimi: ${nimi}`;
      select.appendChild(option);
    })
  }
  select.addEventListener('change', function() {
    const selectedOption = this.selectedOptions[0];
    const yksikko = selectedOption ? selectedOption.dataset.yksikko : '--';
    document.getElementById('tarvikeYksikko').textContent = yksikko;
  });
}
loadTarvikkeet();

async function loadTyokohteet() {
  const res = await fetch('/tyokohde');
  const data = await res.json();

  // asiakastabille
  const tbody = document.querySelector('#tyokohdeTable tbody');
  tbody.innerHTML = '';
  data.forEach(row => {
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${row.tyokohde_id}</td><td>${row.osoite}</td>`;
    tr.onclick = () => showInfo('tyokohdeInfo', `Työkohdenimi: ${row.nimi}, Asiakas: ${row.asiakas_id}, Osoite: ${row.osoite}`);
    tbody.appendChild(tr);
  });

  // laskunlisäysformin optionit
  const select = document.getElementById('tyokohdeSelect');
  if (select) {
    select.innerHTML = '<option value="">-- Valitse työkohde --</option>';

    data.forEach(row => {
      const option = document.createElement('option');
      option.value = row.tyokohde_id;
      option.textContent = `Osoite: ${row.osoite}, ID: ${row.tyokohde_id}, Asiakas: ${row.asiakas_id}`;
      select.appendChild(option);
    });
  }

}
loadTyokohteet();

async function addCustomer() {

  const nimi = document.getElementById("nimi").value;
  const osoite = document.getElementById("osoite").value;

  if (nimi === "" || osoite === "") {
    alert("Täytä nimi ja osoite");
    return;
  }

  await fetch("/asiakas", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      nimi: nimi,
      osoite: osoite
    })
  });
  document.getElementById("nimi").value = "";
  document.getElementById("osoite").value = "";
  loadAsiakas();
}
async function addTyokohde() {

  const nimi = document.getElementById("tyokohdeNimi").value;
  const osoite = document.getElementById("tyokohdeOsoite").value;
  const asiakas_id = document.getElementById("tyokohdeAsiakas").value;

  await fetch("/tyokohde", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ nimi, osoite, asiakas_id })
  });
  document.getElementById("tyokohdeNimi").value = "";
  document.getElementById("tyokohdeOsoite").value = "";
  document.getElementById("tyokohdeAsiakas").value = ""

  loadTyokohteet();
}
document.getElementById("formTuntityo").addEventListener("submit", async function(e) {
  e.preventDefault();

  if (!selectedLaskuId) {
    alert("Valitse ensin lasku!");
    return;
  }

  const paivamaara = document.getElementById("paivamaara").value;
  const tunnit = document.getElementById("tunnit").value;
  const tyotyyppi_id = document.getElementById("tyotyyppi_id").value;
  const alepros = document.getElementById("alepros").value;

  await fetch("/tuntityo", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      lasku_id: selectedLaskuId,
      paivamaara,
      tunnit,
      tyotyyppi_id,
      alepros
    })
  });

  alert("Tuntityö lisätty!");
  document.getElementById("formTuntityo").reset();
});

document.getElementById("formTarvike").addEventListener("submit", async function(e) {
  e.preventDefault();

  if (!selectedLaskuId) {
    alert("Valitse ensin lasku!");
    return;
  }
  const tarvike_id = document.getElementById("tarvike_id").value;
  const maara = document.getElementById("maara").value;

  await fetch("/lasku_tarvike", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      lasku_id: selectedLaskuId,
      tarvike_id,
      maara
    })
  });

  alert("Tarvike lisätty!");
  document.getElementById("formTarvike").reset();
});

</script>

</body>
</html>
