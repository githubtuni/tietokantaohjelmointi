<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Laskutusjärjestelmä</title>

<style>
body {
  font-family: Arial;
}

.tabs {
  margin-bottom: 10px;
}

.tab-button {
  padding: 10px;
  cursor: pointer;
  border: 1px solid #ccc;
  background-color: #eee;
}

.tab-button.active {
  background-color: #ddd;
}

.tab-content {
  display: none;
  border: 1px solid #ccc;
  padding: 10px;
}

.tab-content.active {
  display: block;
}

li {
  cursor: pointer;
  margin: 5px 0;
}

.info {
  margin-top: 10px;
  padding: 10px;
  border: 1px solid #aaa;
  background-color: #f9f9f9;
}

tr:hover {
    cursor: pointer;
}

.selected {
  background-color: #dee7f1;
}

table {
  border-collapse: collapse;
  width: 100%;
}

th, td {
  border: 1px solid #eeeded;
  padding: 6px;
}

</style>

</head>
<body>

<h1>Laskutusjärjestelmä</h1>

<div class="tabs">
  <button class="tab-button active" onclick="openTab('laskut')">Laskut</button>
  <button class="tab-button" onclick="openTab('asiakkaat')">Asiakkaat</button>
  <button class="tab-button" onclick="openTab('tyokohteet')">Työkohteet</button>
</div>


<div id="laskut" class="tab-content active">
    <table id="laskuTable">
        <thead>
          <tr>
            <th>Lasku-ID</th>
            <th>Tila</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    <div id="laskuInfo" class="info">Lisätietoja klikkaamalla</div>
</div>

<div id="asiakkaat" class="tab-content">
    <table id="asiakasTable">
        <thead>
          <tr>
            <th>Asiakas-ID</th>
            <th>Nimi</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
      <div id="asiakasInfo" class="info">Lisätietoja klikkaamalla</div>
      <button onclick="toggleTyokohdeForm()">+ Lisää asiakkaalle työkohde</button>

      <div id="tyokohdeForm" class="form-box" style="display:none">

        <h3>Lisää uusi työkohde</h3>

        <input id="tyokohdeNimi" placeholder="Työkohteen nimi"><br>
        <input id="tyokohdeOsoite" placeholder="Osoite"><br>
        <input id="tyokohdeAsiakas" placeholder="Asiakas ID"><br>

        <button onclick="addTyokohde()">Tallenna</button>

  </div>
  <h3>Lisää uusi asiakas</h3>

  <input id="nimi" placeholder="Nimi">
  <input id="osoite" placeholder="Osoite">

  <button onclick="addCustomer()">Lisää asiakas</button>
</div>

<div id="tyokohteet" class="tab-content">
    <table id="tyokohdeTable">
        <thead>
          <tr>
            <th>Työkohde-ID</th>
            <th>Osoite</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
  <div id="tyokohdeInfo" class="info">Lisätietoja klikkaamalla</div>
</div>
 



<script>
function openTab(tabId) {
    const tabs = document.querySelectorAll('.tab-content');
    const buttons = document.querySelectorAll('.tab-button');

    tabs.forEach(tab => tab.classList.remove('active'));
    buttons.forEach(btn => btn.classList.remove('active'));

    document.getElementById(tabId).classList.add('active');
    event.target.classList.add('active');
}

function showInfo(infoId, text) {
    document.getElementById(infoId).textContent = text;
}
function toggleTyokohdeForm() {

  const form = document.getElementById("tyokohdeForm");

  if (form.style.display === "none") {
    form.style.display = "block";
  } else {
    form.style.display = "none";
  }

}

async function loadAsiakas() {
    const res = await fetch('/asiakas');
    const data = await res.json();
    const tbody = document.querySelector('#asiakasTable tbody');
    tbody.innerHTML = '';

    data.forEach(row => {
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${row.asiakas_id}</td><td>${row.nimi}</td>`;
    tr.onclick = () => showInfo('asiakasInfo', `Asiakas ${row.nimi}, Osoite: ${row.osoite}`);
    tbody.appendChild(tr);
    });
}
loadAsiakas();

async function loadTyokohteet() {
  const res = await fetch('/tyokohde');
  const data = await res.json();
  const tbody = document.querySelector('#tyokohdeTable tbody');
  tbody.innerHTML = '';

  data.forEach(row => {
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${row.tyokohde_id}</td><td>${row.osoite}</td>`;
    tr.onclick = () => showInfo('tyokohdeInfo', `Työkohdenimi: ${row.nimi}, Asiakas: ${row.asiakas_id}, Osoite: ${row.osoite}`);
    tbody.appendChild(tr);
  });
}
loadTyokohteet();

async function addCustomer() {

  const nimi = document.getElementById("nimi").value;
  const osoite = document.getElementById("osoite").value;

  if (nimi === "" || osoite === "") {
    alert("Täytä nimi ja osoite");
    return;
  }

  await fetch("/asiakas", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      nimi: nimi,
      osoite: osoite
    })
  });
  document.getElementById("nimi").value = "";
  document.getElementById("osoite").value = "";
  loadAsiakas();
}
async function addTyokohde() {

  const nimi = document.getElementById("tyokohdeNimi").value;
  const osoite = document.getElementById("tyokohdeOsoite").value;
  const asiakas_id = document.getElementById("tyokohdeAsiakas").value;

  await fetch("/tyokohde", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ nimi, osoite, asiakas_id })
  });
  document.getElementById("tyokohdeNimi").value = "";
  document.getElementById("tyokohdeOsoite").value = "";
  document.getElementById("tyokohdeAsiakas").value = ""

  loadTyokohteet();
}

</script>

</body>
</html>
