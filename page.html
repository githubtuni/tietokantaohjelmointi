<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Laskutusjärjestelmä</title>

<style>
body {
  font-family: Arial;
}

.tabs {
  margin-bottom: 10px;
}

.tab-button {
  padding: 10px;
  cursor: pointer;
  border: 1px solid #ccc;
  background-color: #eee;
}

.tab-button.active {
  background-color: #ddd;
}

.tab-content {
  display: none;
  border: 1px solid #ccc;
  padding: 10px;
}

.tab-content.active {
  display: block;
}

li {
  cursor: pointer;
  margin: 5px 0;
}

.info {
  margin-top: 10px;
  padding: 10px;
  border: 1px solid #aaa;
  background-color: #f9f9f9;
}
</style>

</head>
<body>

<h1>Laskutusjärjestelmä</h1>

<div class="tabs">
  <button class="tab-button active" onclick="openTab('tab1')">Laskut</button>
  <button class="tab-button" onclick="openTab('tab2')">Asiakkaat</button>
  <button class="tab-button" onclick="openTab('tab3')">Työkohteet</button>
</div>

<div id="tab1" class="tab-content active">
  <ul>
    <li onclick="showInfo('info1','Tila: Valmis, Maksettu: Ei')">Lasku 1</li>
    <li onclick="showInfo('info1','Tila: Valmis, Maksettu : Kyllä')">Lasku 2</li>
    <li onclick="showInfo('info1','Tila: Kesken, Maksettu: ')">Lasku 3</li>
  </ul>
  <div id="info1" class="info">Lisätietoja klikkaamalla</div>
</div>

<div id="tab2" class="tab-content">
  <ul>
    <li onclick="showInfo('info2','Osoite: 1')">Asiakas 1</li>
    <li onclick="showInfo('info2','Osoite: 2')">Asiakas 2</li>
    <li onclick="showInfo('info2','Osoite: 3')">Asiakas 3</li>
  </ul>
  <div id="info2" class="info">Lisätietoja klikkaamalla</div>
</div>

<div id="tab3" class="tab-content">
  <ul>
    <li onclick="showInfo('info3','Osoite: x')">Työkohde 1</li>
    <li onclick="showInfo('info3','Osoite: y')">Työkohde 2</li>
    <li onclick="showInfo('info3','Osoite: v')">Työkohde 3</li>
  </ul>
  <div id="info3" class="info">Lisätietoja klikkaamalla</div>
</div>

<script>
function openTab(tabId) {
  const tabs = document.querySelectorAll('.tab-content');
  const buttons = document.querySelectorAll('.tab-button');

  tabs.forEach(tab => tab.classList.remove('active'));
  buttons.forEach(btn => btn.classList.remove('active'));

  document.getElementById(tabId).classList.add('active');
  event.target.classList.add('active');
}

function showInfo(infoId, text) {
  document.getElementById(infoId).textContent = text;
}
</script>

</body>
</html>
